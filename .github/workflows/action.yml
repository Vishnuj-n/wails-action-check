name: Wails build

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      target_ref:
        description: 'Branch or tag to build (e.g. v1.2.3 or refs/tags/v1.2.3)'
        required: true
        default: 'v1.2.3'

env:
  APP_NAME: "wails-action-check"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: "linux/amd64"
            os: "ubuntu-latest"
          - platform: "windows/amd64"
            os: "windows-latest"
          - platform: "darwin/universal"
            os: "macos-latest"

    runs-on: ${{ matrix.build.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wails
        uses: dAppCore/build/actions/build/wails2@v4.0.0
        id: build
        with:
          build-name: ${{ env.APP_NAME }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          go-version: "1.23"
          node-version: "22.x"
